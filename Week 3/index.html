<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Tools</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="banner">
    <div class="container">

        <div class="header-box">
            <h1>String Tools</h1>
            <div class="actions">
                <button class="btn primary" onclick="runReplaceAll()">ReplaceAll</button>
                <button class="btn secondary" onclick="runSearchWord()">SearchWord</button>
            </div>
        </div>

        <div class="card">
            <h2>ReplaceAll</h2>
            <input type="text" id="replaceInput" placeholder="Enter text">
            <p id="replaceOutput" class="output"></p>
        </div>

        <div class="card">
            <h2>SearchWord</h2>
            <input type="text" id="sentence" placeholder="Sentence">
            <input type="text" id="word" placeholder="Word">
            <p id="searchOutput" class="output"></p>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
